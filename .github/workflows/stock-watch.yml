name: stock-watch

# Runs on a schedule + lets you trigger it manually.
# Each run: (1) reads your Telegram commands and updates the watchlist,
#           (2) checks every watched product and alerts on stock changes.
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (UTC). GitHub may delay a few min.
  workflow_dispatch:          # manual "Run workflow" button

permissions:
  contents: write             # needed to commit state files back

concurrency:
  group: stock-watch
  cancel-in-progress: false   # never run two copies at once

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run stock bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python3 stock_bot.py

      - name: Persist state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist.json stock_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "update watchlist/state [skip ci]"
            git push
          fi
